version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/infra/database/postgresql/sqlc/query"
    schema: "./internal/infra/database/postgresql/migration"
    gen:
      go:
        package: "repo"
        out: "./internal/infra/database/postgresql/sqlc/generated"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            nullable: false
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true